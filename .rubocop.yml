AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable

Layout/LineLength:
  Max: 128

Metrics/ClassLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Metrics/ParameterLists:
  Enabled: false
Metrics/BlockLength:
  Exclude:
    - "spec/**/*_spec.rb"

Style/Documentation:
  Enabled: false
Style/SafeNavigationChainLength:
  Enabled: false
Style/ComparableClamp:
  Enabled: false
Style/RedundantStructKeywordInit:
  Enabled: false
Lint/MissingSuper:
  Enabled: false
Lint/DuplicateBranch:
  Enabled: false
Lint/UnusedMethodArgument:
  Enabled: false
Style/RescueModifier:
  Enabled: false
Style/NestedTernaryOperator:
  Enabled: false
